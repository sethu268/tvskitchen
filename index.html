<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thaai Veettu Samayal - TVS Kitchen</title>
    <!-- Tailwind CSS for modern, fast styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <!-- Header / Brand Banner Section -->
    <header class="bg-white shadow-sm sticky top-0 z-50 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center space-x-2">
            <!-- Your logo from image.png will go here -->
            <span class="text-xl font-bold text-emerald-700">TVS Kitchen</span>
        </div>
        <span class="text-xs bg-emerald-100 text-emerald-800 font-semibold px-2 py-1 rounded">● Kitchen Open</span>
    </header>

    <!-- Hero / Trust Building Section -->
    <main class="max-w-md mx-auto p-4 space-y-6">
        <div class="bg-gradient-to-r from-emerald-800 to-emerald-600 rounded-2xl p-6 text-white shadow-lg">
            <h1 class="text-2xl font-bold">தாய்வீட்டு சமையல்</h1>
            <p class="text-emerald-100 text-sm mt-1">Authentic, wholesome home-style cooking delivered straight to your door.</p>
            <div class="mt-4 flex gap-2 text-xs">
                <span class="bg-white/20 px-2 py-1 rounded">✓ No Added MSG</span>
                <span class="bg-white/20 px-2 py-1 rounded">✓ Freshly Made</span>
            </div>
        </div>

        <!-- Food Menu Section -->
        <div>
            <h2 class="text-lg font-bold text-gray-800 mb-3">Today's Menu</h2>
            <div class="space-y-4">
                
                <!-- Food Item Card -->
                <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 flex justify-between items-center">
                    <div class="space-y-1">
                        <div class="flex items-center space-x-1.5">
                            <span class="border border-green-600 p-0.5 rounded text-[10px] text-green-600 font-bold leading-none">⊡</span>
                            <h3 class="font-semibold text-gray-900">Standard Veg Meals</h3>
                        </div>
                        <p class="text-xs text-gray-500">Rice, Sambar, Rasam, Kootu, Poriyal & Curd.</p>
                        <p class="text-sm font-bold text-gray-800">₹120</p>
                    </div>
                    <!-- Replace the script below with your real live Razorpay button embed code -->
                    <button class="bg-red-600 hover:bg-red-700 text-white font-bold px-4 py-2 rounded-lg text-sm transition shadow-sm">
                        Order Now
                    </button>
                </div>

            </div>
        </div>
    </main>

</body>
</html>
